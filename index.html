    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Подсветка синтаксиса кода -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/tokyo-night-dark.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #050505;
            margin: 0;
            overflow: hidden;
            color: white;
        }

        /* Анимации фона */
        @keyframes blob {
            0% { transform: translate3d(0px, 0px, 0) scale(1); }
            33% { transform: translate3d(30px, -50px, 0) scale(1.1); }
            66% { transform: translate3d(-20px, 20px, 0) scale(0.9); }
            100% { transform: translate3d(0px, 0px, 0) scale(1); }
        }

        .animate-blob {
            animation: blob 10s infinite alternate ease-in-out;
            will-change: transform;
            -webkit-backface-visibility: hidden;
            -webkit-transform: translate3d(0, 0, 0);
        }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }

        /* Оптимизированные градиенты с плавным переходом темы */
        .blob-shape { border-radius: 50%; pointer-events: none; transition: background 1.5s ease-in-out; }
        .blob-pink { background: radial-gradient(circle, rgba(219, 39, 119, 0.4) 0%, rgba(219, 39, 119, 0) 70%); }
        .blob-purple { background: radial-gradient(circle, rgba(147, 51, 234, 0.4) 0%, rgba(147, 51, 234, 0) 70%); }
        .blob-indigo { background: radial-gradient(circle, rgba(79, 70, 229, 0.4) 0%, rgba(79, 70, 229, 0) 70%); }

        /* Glassmorphism */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .liquid-glass-input {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        .liquid-glass-btn {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* Сообщения */
        .msg-enter {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        .msg-user {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.15), rgba(168, 85, 247, 0.05));
            border: 1px solid rgba(236, 72, 153, 0.2);
            border-bottom-right-radius: 4px;
        }
        .msg-bot {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-bottom-left-radius: 4px;
        }

        /* Индикатор печати */
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Скроллбар */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

        /* MARKDOWN */
        .markdown-body { line-height: 1.6; word-break: break-word; }
        .markdown-body p { margin-bottom: 0.75em; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body ul { list-style-type: disc; margin-left: 1.5em; margin-bottom: 0.75em; }
        .markdown-body ol { list-style-type: decimal; margin-left: 1.5em; margin-bottom: 0.75em; }
        .markdown-body strong { color: rgba(255, 255, 255, 0.95); font-weight: 600; }
        .markdown-body a { color: #f472b6; text-decoration: underline; }
        .markdown-body code:not([class*="language-"]) { background: rgba(255, 255, 255, 0.1); padding: 2px 6px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.85em; color: #fbcfe8; }
        .markdown-body pre { background: rgba(10, 10, 15, 0.8) !important; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; margin-top: 12px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .markdown-body pre code { font-family: 'JetBrains Mono', monospace; font-size: 0.85em; padding: 16px; display: block; overflow-x: auto; }
        .code-header { display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.05); padding: 6px 16px; font-size: 11px; text-transform: uppercase; color: rgba(255, 255, 255, 0.5); border-bottom: 1px solid rgba(255, 255, 255, 0.05); font-family: 'Inter', sans-serif;}
        
        /* Стили для сгенерированных картинок в Markdown */
        .markdown-body img { max-width: 100%; border-radius: 0.75rem; border: 1px solid rgba(255,255,255,0.2); display: block; margin: 0.5rem 0; }

        .recording { animation: pulseMic 1.5s infinite; color: #f87171 !important; }
        @keyframes pulseMic { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
        .speaking { animation: pulseSpeak 1.5s infinite; color: #60a5fa !important; }
        @keyframes pulseSpeak { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* Аватарка LARISA AI */
        .larisa-avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .larisa-avatar-container {
            border-radius: 50%;
            background: linear-gradient(to top right, #f472b6, #a855f7);
            padding: 2px;
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.3);
        }
        .larisa-avatar-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(16px);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes eye-blink { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
        .eye-icon-analyzing { animation: eye-blink 2s infinite ease-in-out; }
    </style>
</head>

                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>

                <textarea id="user-input" rows="1" class="flex-1 bg-transparent border-none text-white px-2 py-3 outline-none placeholder-white/30 text-sm sm:text-base resize-none self-center" placeholder="Спроси, попроси код или напиши «Нарисуй...»"></textarea>
                
                <button id="stop-btn" class="hidden w-10 h-10 sm:w-12 sm:h-12 shrink-0 rounded-full bg-white/10 flex items-center justify-center text-white ml-1 mb-0.5"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"></rect></svg></button>
                <button id="send-btn" class="w-10 h-10 sm:w-12 sm:h-12 shrink-0 rounded-full bg-gradient-to-r from-pink-500 to-purple-600 flex items-center justify-center text-white ml-1 mb-0.5">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>

        </footer>
    </div>

    <script>
        // НОВЫЙ КЛЮЧ
        const API_KEY = 'x7hLVf8zXBtC3wXV3p4my0EOMhJ20Q5s';
        const API_URL = 'https://api.mistral.ai/v1/chat/completions';

        // Настройка Markdown
        marked.setOptions({
            highlight: (code, lang) => hljs.highlightAuto(code).value,
            breaks: true, gfm: true
        });

        let currentUser = 'Вы';
        let chatHistory = [];
        let currentAbortController = null;
        let attachedImageBase64 = null;
        let welcomeMessageId = null;

        const DEFAULT_PROMPT = 'Твое имя — LARISA AI. Ты продвинутая нейросеть-помощница. Всегда отвечай на русском. Если просят написать игру или программу, старайся писать её на HTML+JS в ОДНОМ блоке кода, чтобы пользователь мог её сразу запустить. Пиши код в Markdown блоках.';
        
        // НОВЫЕ НАСТРОЙКИ (Добавлена модель и авто-голос)
        let botSettings = {
            temperature: parseFloat(localStorage.getItem('larisa_temp')) || 0.7,
            systemPrompt: localStorage.getItem('larisa_prompt') || DEFAULT_PROMPT,
            model: localStorage.getItem('larisa_model') || 'mistral-large-latest',
            autoVoice: localStorage.getItem('larisa_autovoice') === 'true'
        };

        // --- ДИНАМИЧЕСКИЕ ТЕМЫ ---
        const blobs = [document.getElementById('blob-1'), document.getElementById('blob-2'), document.getElementById('blob-3')];
        function updateTheme(model) {
            const themes = {
                'mistral-large-latest': ['rgba(219, 39, 119, 0.4)', 'rgba(147, 51, 234, 0.4)', 'rgba(79, 70, 229, 0.4)'], // Розовый/Пурпурный
                'mistral-small-latest': ['rgba(56, 189, 248, 0.4)', 'rgba(59, 130, 246, 0.4)', 'rgba(99, 102, 241, 0.4)'], // Неоново-голубой
                'codestral-latest': ['rgba(16, 185, 129, 0.4)', 'rgba(5, 150, 105, 0.4)', 'rgba(4, 120, 87, 0.4)'],       // Хакерский зеленый
                'pixtral-12b-2409': ['rgba(249, 115, 22, 0.4)', 'rgba(245, 158, 11, 0.4)', 'rgba(234, 179, 8, 0.4)']       // Теплый желтый/оранжевый
            };
            const colors = themes[model] || themes['mistral-large-latest'];
            blobs[0].style.background = `radial-gradient(circle, ${colors[0]} 0%, transparent 70%)`;
            blobs[1].style.background = `radial-gradient(circle, ${colors[1]} 0%, transparent 70%)`;
            blobs[2].style.background = `radial-gradient(circle, ${colors[2]} 0%, transparent 70%)`;
        }

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const authOverlay = document.getElementById('auth-overlay');
        const mainApp = document.getElementById('main-app');
        const fileInput = document.getElementById('file-input');
        const imgPreviewContainer = document.getElementById('image-preview-container');
        const imgPreview = document.getElementById('image-preview');
        const typingIndicator = document.getElementById('typing-indicator');
        const typingAvatarImg = document.getElementById('typing-avatar-img');
        const typingEyeIcon = document.getElementById('typing-eye-icon');

        // Элементы новой панели
        const mainModelSelect = document.getElementById('main-model-select');
        const surpriseBtn = document.getElementById('surprise-btn');
        let previousModel = botSettings.model;

        // Инициализация
        mainModelSelect.value = botSettings.model;
        updateTheme(botSettings.model);

        mainModelSelect.addEventListener('change', (e) => {
            const selected = e.target.value;
            botSettings.model = selected;
            localStorage.setItem('larisa_model', selected);
            updateTheme(selected);

            if (selected === 'pixtral-12b-2409' && !attachedImageBase64) {
                fileInput.click(); // Предлагаем выбрать фото
            } else if (selected !== 'pixtral-12b-2409') {
                previousModel = selected;
            }
        });

        surpriseBtn.addEventListener('click', () => {
            const prompts = [
                "Напиши код классической змейки на Python",
                "Нарисуй футуристичный киберпанк город с неоновыми огнями",
                "Создай крутую кнопку на HTML и CSS с анимацией свечения",
                "Как объяснить теорию относительности 5-летнему ребенку?",
                "Сгенерируй картинку: кот-астронавт на Марсе пьет кофе",
                "Напиши скрипт красивого падающего снега на JS для сайта"
            ];
            userInput.value = prompts[Math.floor(Math.random() * prompts.length)];
            userInput.style.height = 'auto';
            userInput.style.height = (userInput.scrollHeight < 150 ? userInput.scrollHeight : 150) + 'px';
            userInput.focus();
        });

        // --- АВТОРИЗАЦИЯ ---
        function showApp(userName) {
            currentUser = userName;
            document.getElementById('user-status').innerText = `Онлайн: ${userName}`;
            authOverlay.classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => authOverlay.classList.add('hidden'), 500);
            mainApp.classList.remove('opacity-0', 'scale-95', 'pointer-events-none');
            loadChat();
        }

        document.getElementById('auth-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const isLogin = document.getElementById('auth-name').classList.contains('hidden');
            let name = isLogin ? (localStorage.getItem('larisa_user_name') || 'Гость') : document.getElementById('auth-name').value;
            localStorage.setItem('larisa_user_name', name);
            localStorage.setItem('larisa_auth', 'true');
            showApp(name);
        });

        document.getElementById('auth-switch-btn').addEventListener('click', () => {
            const isLogin = document.getElementById('auth-name').classList.toggle('hidden');
            document.getElementById('auth-title').innerText = isLogin ? 'С возвращением' : 'Регистрация';
            document.getElementById('auth-submit-btn').innerText = isLogin ? 'Войти' : 'Создать';
        });

        let googleClient;
        window.addEventListener('load', () => {
            if (window.google) {
                googleClient = google.accounts.oauth2.initTokenClient({
                    client_id: '332099797152-5vscnrdirtnk13tlfcqteogev9pj001v.apps.googleusercontent.com',
                    scope: 'profile email',
                    callback: (tokenResponse) => {
                        if (tokenResponse && tokenResponse.access_token) {
                            fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: `Bearer ${tokenResponse.access_token}` } })
                            .then(res => res.json())
                            .then(data => {
                                const name = data.name || data.given_name || 'Google User';
                                localStorage.setItem('larisa_user_name', name);
                                localStorage.setItem('larisa_auth', 'true');
                                showApp(name);
                            }).catch(console.error);
                        }
                    },
                });
            }
        });

        document.getElementById('google-login-btn').addEventListener('click', () => {
            if (window.location.protocol === 'file:') return alert("Google запрещает вход через file://. Используйте локальный сервер!");
            if (googleClient) googleClient.requestAccessToken();
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('larisa_auth');
            mainApp.classList.add('opacity-0', 'scale-95', 'pointer-events-none');
            authOverlay.classList.remove('hidden');
            setTimeout(() => authOverlay.classList.remove('opacity-0', 'pointer-events-none'), 10);
            initChat(true);
        });

        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('larisa_auth') === 'true') {
                showApp(localStorage.getItem('larisa_user_name') || 'Пользователь');
            } else {
                initChat();
            }
        });

        // --- ЛОГИКА ФОТО (VISION) ---
        document.getElementById('attach-btn').addEventListener('click', () => fileInput.click());
        document.getElementById('remove-image-btn').addEventListener('click', () => {
            attachedImageBase64 = null;
            fileInput.value = '';
            imgPreviewContainer.classList.add('hidden');
            
            // Возвращаем предыдущую модель
            if (mainModelSelect.value === 'pixtral-12b-2409') {
                mainModelSelect.value = previousModel;
                botSettings.model = previousModel;
                updateTheme(previousModel);
            }
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    let width = img.width; let height = img.height;
                    const MAX = 600; 
                    if (width > height && width > MAX) { height *= MAX / width; width = MAX; } 
                    else if (height > MAX) { width *= MAX / height; height = MAX; }
                    canvas.width = width; canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    attachedImageBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    imgPreview.src = attachedImageBase64;
                    imgPreviewContainer.classList.remove('hidden');
                    
                    // Авто-переключение на VISION
                    if (mainModelSelect.value !== 'pixtral-12b-2409') {
                        previousModel = mainModelSelect.value;
                        mainModelSelect.value = 'pixtral-12b-2409';
                        botSettings.model = 'pixtral-12b-2409';
                        updateTheme('pixtral-12b-2409');
                    }
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // --- ЛОГИКА ЧАТА ---
        function saveChat() { localStorage.setItem('larisa_history', JSON.stringify(chatHistory)); }
        
        function loadChat() {
            const saved = localStorage.getItem('larisa_history');
            chatContainer.querySelectorAll('.msg-bubble-wrap').forEach(m => m.remove());
            if (saved) {
                chatHistory = JSON.parse(saved);
                if (chatHistory.length > 1) {
                    chatHistory.forEach(msg => { 
                        if (msg.role === 'system') return;
                        if (Array.isArray(msg.content)) {
                            const textObj = msg.content.find(c => c.type === 'text');
                            const imgObj = msg.content.find(c => c.type === 'image_url');
                            appendMessage(textObj ? textObj.text : '', msg.role, false, imgObj ? imgObj.image_url.url : null);
                        } else {
                            appendMessage(msg.content, msg.role, false); 
                        }
                    });
                } else { initChat(); }
            } else { initChat(); }
        }

        function initChat(clearLocal = false) {
            chatHistory = [{ role: 'system', content: botSettings.systemPrompt }];
            chatContainer.querySelectorAll('.msg-bubble-wrap').forEach(m => m.remove());
            if (clearLocal) localStorage.removeItem('larisa_history');
            const welcomeText = "Привет! Я <b>LARISA AI (Версия 6.0)</b>.\n\n✨ Я могу менять свой \"мозг\" под твои задачи в меню снизу!\n💻 Выбирай **LARISA CODE** для идеального программирования\n👁️ Выбирай **LARISA VISION** и прикрепляй фото 📸\n🎨 Напиши «Нарисуй...» для генерации квадратных аватарок!";
            welcomeMessageId = appendMessage(welcomeText, 'assistant', false);
        }

        async function fetchMistralResponse(userMessageText, imageBase64) {
            let messageContent;
            if (imageBase64) {
                messageContent = [{ type: "text", text: userMessageText || "Опиши это изображение подробно." }, { type: "image_url", image_url: { url: imageBase64 } }];
            } else {
                messageContent = userMessageText;
            }

            chatHistory.push({ role: 'user', content: messageContent });
            saveChat();
            currentAbortController = new AbortController();

            try {
                // Выбор модели в зависимости от наличия картинки и настроек
                const hasImage = chatHistory.some(m => Array.isArray(m.content));
                const modelToUse = hasImage ? 'pixtral-12b-2409' : botSettings.model;

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                    signal: currentAbortController.signal,
                    body: JSON.stringify({ model: modelToUse, messages: chatHistory, temperature: botSettings.temperature })
                });

                if (!response.ok) throw new Error(`Ошибка API: ${response.status}`);
                const data = await response.json();
                const reply = data.choices[0].message.content;

                chatHistory.push({ role: 'assistant', content: reply });
                const lastUserMsg = chatHistory[chatHistory.length - 2];
                if (Array.isArray(lastUserMsg.content)) {
                    lastUserMsg.content = `[Пользователь отправил изображение] ${userMessageText}`;
                }
                saveChat();
                return reply;
            } catch (e) { 
                if (e.name === 'AbortError') return "🚫 Генерация остановлена.";
                return "Ошибка сети. Убедитесь, что ключ активен."; 
            }
        }

        // Логика предпросмотра кода
        window.openPreview = (code) => {
            const previewModal = document.getElementById('preview-modal');
            const previewIframe = document.getElementById('preview-iframe');
            previewIframe.srcdoc = code;
            previewModal.classList.remove('hidden');
            setTimeout(() => {
                previewModal.classList.remove('opacity-0');
                previewModal.firstElementChild.classList.remove('scale-95');
            }, 10);
        };
        
        document.getElementById('close-preview-btn').addEventListener('click', () => {
            const previewModal = document.getElementById('preview-modal');
            const previewIframe = document.getElementById('preview-iframe');
            previewModal.classList.add('opacity-0');
            previewModal.firstElementChild.classList.add('scale-95');
            setTimeout(() => {
                previewModal.classList.add('hidden');
                previewIframe.srcdoc = '';
            }, 300);
        });

        function appendMessage(text, role, save = true, imgSrc = null) {
            if (welcomeMessageId) {
                const welcomeMsg = document.querySelector(`[data-msg-id="${welcomeMessageId}"]`);
                if (welcomeMsg) welcomeMsg.classList.add('hidden');
                welcomeMessageId = null;
            }

            const isUser = role === 'user';
            const msgId = Date.now();
            
            const wrap = document.createElement('div');
            wrap.dataset.msgId = msgId;
            wrap.className = `msg-bubble-wrap flex gap-3 max-w-[95%] sm:max-w-[85%] msg-enter ${isUser ? 'self-end flex-row-reverse' : 'self-start'}`;
            
            if (!isUser) {
                const avatarContainer = document.createElement('div');
                avatarContainer.className = "w-8 h-8 sm:w-10 sm:h-10 shrink-0 larisa-avatar-container p-[1.5px] self-end mb-1";
                avatarContainer.innerHTML = '<div class="larisa-avatar-inner"><img src="image.png" alt="LARISA AI" class="larisa-avatar" onerror="this.onerror=null; this.src=\'https://ui-avatars.com/api/?name=L&background=f472b6&color=fff&size=64\';"></div>';
                wrap.appendChild(avatarContainer);
            }

            const bubbleContainer = document.createElement('div');
            bubbleContainer.className = 'flex flex-col gap-1 flex-1 min-w-0';

            const bubble = document.createElement('div');
            bubble.className = `rounded-3xl px-5 py-3.5 text-sm text-white/95 shadow-lg markdown-body flex flex-col gap-2 ${isUser ? 'msg-user rounded-br-none' : 'msg-bot rounded-bl-none'}`;
            
            if (imgSrc) {
                const imgEl = document.createElement('img');
                imgEl.src = imgSrc;
                imgEl.className = "max-w-[200px] sm:max-w-[250px] rounded-xl border border-white/20 self-start";
                bubble.appendChild(imgEl);
            }

            const textEl = document.createElement('div');
            textEl.innerHTML = isUser ? text : marked.parse(text);
            bubble.appendChild(textEl);

            // НОВАЯ ФУНКЦИЯ: Кнопка Предпросмотра кода
            if (!isUser) {
                bubble.querySelectorAll('pre').forEach(pre => {
                    const codeBlock = pre.querySelector('code');
                    let lang = 'code';
                    if(codeBlock && codeBlock.className) {
                        const match = codeBlock.className.match(/language-(\w+)/);
                        if(match) lang = match[1];
                    }
                    
                    const header = document.createElement('div');
                    header.className = 'code-header';
                    
                    const controls = document.createElement('div');
                    controls.className = "flex items-center gap-3";
                    
                    // Кнопка "Запустить" теперь появляется для ЛЮБОГО блока кода
                    const previewBtn = document.createElement('button');
                    previewBtn.className = 'flex items-center gap-1.5 text-green-400 hover:text-green-300 transition cursor-pointer font-bold';
                    previewBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg> Запустить';
                    previewBtn.onclick = () => window.openPreview(codeBlock.innerText);
                    controls.appendChild(previewBtn);
                    
                    const copyBtn = document.createElement('button');
                    copyBtn.className = 'flex items-center gap-1.5 hover:text-white transition cursor-pointer';
                    copyBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Копировать';
                    copyBtn.onclick = () => window.copyToClipboard(codeBlock.innerText, copyBtn);
                    controls.appendChild(copyBtn);

                    const langSpan = document.createElement('span');
                    langSpan.innerText = lang;

                    header.appendChild(langSpan);
                    header.appendChild(controls);
                    pre.prepend(header);
                });
            }
            
            bubbleContainer.appendChild(bubble);
            wrap.appendChild(bubbleContainer);
            chatContainer.appendChild(wrap);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            if (save) saveChat();
            
            return msgId;
        }

        sendBtn.addEventListener('click', async () => {
            const text = userInput.value.trim();
            if (!text && !attachedImageBase64) return;
            const currentImage = attachedImageBase64;
            userInput.value = '';
            attachedImageBase64 = null;
            imgPreviewContainer.classList.add('hidden');
            fileInput.value = '';

            appendMessage(text, 'user', true, currentImage);
            
            typingIndicator.classList.remove('hidden');
            if (currentImage) {
                typingAvatarImg.classList.add('hidden');
                typingEyeIcon.classList.remove('hidden');
            } else {
                typingAvatarImg.classList.remove('hidden');
                typingEyeIcon.classList.add('hidden');
            }

            sendBtn.classList.add('hidden');
            document.getElementById('stop-btn').classList.remove('hidden');
            
            // --- ГЕНЕРАЦИЯ КАРТИНОК (Квадратные, без текста) ---
            const drawRegex = /^(?:нарисуй|сгенерируй(?: картинку| фото)?|draw)\s+(.+)/i;
            const match = text.match(drawRegex);

            if (match && !currentImage) {
                chatHistory.push({ role: 'user', content: text });
                saveChat();

                const imagePrompt = match[1] + ", square, no text, no letters, no watermarks, clear image";
                const seed = Math.floor(Math.random() * 1000000);
                const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(imagePrompt)}?width=512&height=512&nologo=true&seed=${seed}`;

                const img = new Image();
                img.onload = () => {
                    typingIndicator.classList.add('hidden');
                    typingAvatarImg.classList.remove('hidden');
                    typingEyeIcon.classList.add('hidden');
                    sendBtn.classList.remove('hidden');
                    document.getElementById('stop-btn').classList.add('hidden');

                    const replyText = `Вот картинка по твоему запросу:\n\n![${match[1]}](${imgUrl})`;
                    chatHistory.push({ role: 'assistant', content: replyText });
                    saveChat();
                    appendMessage(replyText, 'assistant', false);
                };
                img.onerror = () => {
                    typingIndicator.classList.add('hidden');
                    sendBtn.classList.remove('hidden');
                    document.getElementById('stop-btn').classList.add('hidden');
                    const errorMsg = "Извини, не удалось сгенерировать картинку. Попробуй другой запрос.";
                    chatHistory.push({ role: 'assistant', content: errorMsg });
                    saveChat();
                    appendMessage(errorMsg, 'assistant', false);
                };
                img.src = imgUrl;
                return;
            }
            // --- КОНЕЦ ГЕНЕРАЦИИ ---

            const reply = await fetchMistralResponse(text, currentImage);
            
            typingIndicator.classList.add('hidden');
            typingAvatarImg.classList.remove('hidden');
            typingEyeIcon.classList.add('hidden');
            sendBtn.classList.remove('hidden');
            document.getElementById('stop-btn').classList.add('hidden');
            
            appendMessage(reply, 'assistant');

            // АВТО-ОЗВУЧКА
            if (botSettings.autoVoice && reply && !reply.startsWith('🚫')) {
                // Создаем "фиктивную" кнопку для визуализации статуса разговора, или просто вызываем API
                const dummyBtn = document.createElement('div');
                window.speakText(reply, dummyBtn);
            }
        });

        // Утилиты
        window.copyToClipboard = (text, btn) => { navigator.clipboard.writeText(text); btn.innerText = 'Copied!'; setTimeout(() => btn.innerText = 'Copy', 2000); };
        
        // --- ЛОГИКА САЙДБАРА ---
        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('-translate-x-full'); 
            document.getElementById('sidebar-overlay').classList.toggle('hidden'); 
        }
        document.getElementById('menu-btn').addEventListener('click', toggleSidebar);
        document.getElementById('close-sidebar-btn').addEventListener('click', toggleSidebar);
        document.getElementById('sidebar-overlay').addEventListener('click', toggleSidebar);
        
        document.getElementById('new-chat-btn').addEventListener('click', () => { 
            initChat(true); 
            toggleSidebar(); 
        });

        // --- ЛОГИКА НАСТРОЕК ---
        const settingsModal = document.getElementById('settings-modal');
        document.getElementById('settings-btn').addEventListener('click', () => {
            document.getElementById('temp-slider').value = botSettings.temperature;
            document.getElementById('temp-val').innerText = botSettings.temperature;
            document.getElementById('auto-voice-toggle').checked = botSettings.autoVoice;
            document.getElementById('system-prompt-input').value = botSettings.systemPrompt;
            settingsModal.classList.remove('hidden');
            setTimeout(() => {
                settingsModal.classList.remove('opacity-0');
                settingsModal.firstElementChild.classList.remove('scale-95');
            }, 10);
            toggleSidebar();
        });

        function closeSettings() {
            settingsModal.classList.add('opacity-0');
            settingsModal.firstElementChild.classList.add('scale-95');
            setTimeout(() => settingsModal.classList.add('hidden'), 300);
        }
        document.getElementById('close-settings-btn').addEventListener('click', closeSettings);

        document.getElementById('temp-slider').addEventListener('input', (e) => {
            document.getElementById('temp-val').innerText = e.target.value;
        });

        document.getElementById('save-settings-btn').addEventListener('click', () => {
            botSettings.temperature = parseFloat(document.getElementById('temp-slider').value);
            botSettings.autoVoice = document.getElementById('auto-voice-toggle').checked;
            botSettings.systemPrompt = document.getElementById('system-prompt-input').value.trim();
            
            localStorage.setItem('larisa_temp', botSettings.temperature);
            localStorage.setItem('larisa_autovoice', botSettings.autoVoice);
            localStorage.setItem('larisa_prompt', botSettings.systemPrompt);
            
            if (chatHistory.length > 0 && chatHistory[0].role === 'system') {
                chatHistory[0].content = botSettings.systemPrompt;
                saveChat();
            }
            closeSettings();
        });

        userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); } });

        // Остановка генерации
        document.getElementById('stop-btn').addEventListener('click', () => {
            if (currentAbortController) currentAbortController.abort();
        });
        
        // --- ГОЛОСОВОЙ ВВОД (Микрофон) ---
        let recognition;
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRec();
            recognition.lang = 'ru-RU';
            recognition.continuous = false;
            
            recognition.onresult = (e) => {
                userInput.value += (userInput.value ? ' ' : '') + e.results[0][0].transcript;
                userInput.style.height = 'auto';
                userInput.style.height = (userInput.scrollHeight < 150 ? userInput.scrollHeight : 150) + 'px';
            };
            recognition.onstart = () => document.getElementById('mic-btn').classList.add('recording');
            recognition.onend = () => document.getElementById('mic-btn').classList.remove('recording');
            recognition.onerror = () => document.getElementById('mic-btn').classList.remove('recording');
        }

        document.getElementById('mic-btn').addEventListener('click', () => {
            if (!recognition) return alert("Голосовой ввод не поддерживается браузером.");
            document.getElementById('mic-btn').classList.contains('recording') ? recognition.stop() : recognition.start();
        });

        // TTS (Текст в речь)
        window.speakText = function(text, btnElement) {
            if (!('speechSynthesis' in window)) return alert("Синтез речи не поддерживается.");
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                document.querySelectorAll('.speaking').forEach(el => el.classList.remove('speaking'));
                return;
            }
            const cleanText = text.replace(/#|\*|_|`|>|\[|\]|\(|\)|!\[.*\]\(.*\)/g, '');
            let currentUtterance = new SpeechSynthesisUtterance(cleanText);
            currentUtterance.lang = 'ru-RU';
            currentUtterance.onstart = () => btnElement.classList.add('speaking');
            currentUtterance.onend = () => btnElement.classList.remove('speaking');
            window.speechSynthesis.speak(currentUtterance);
        };
    </script>
</body>
</html>
